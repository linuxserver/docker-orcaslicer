name: Sync with Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/linuxserver/docker-orcaslicer.git
          git fetch upstream master

      - name: Create or checkout snapmaker-orca branch
        run: |
          git checkout snapmaker-orca 2>/dev/null || git checkout -b snapmaker-orca

      - name: Rebase on upstream master
        run: |
          git rebase upstream/master || {
            git checkout --ours Dockerfile
            git add Dockerfile
            git rebase --continue
          }

      - name: Push snapmaker-orca branch
        run: |
          git push origin snapmaker-orca -f

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:snapmaker-orca`
            });
            
            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore: Sync with upstream linuxserver master',
                body: 'Automated sync with linuxserver/docker-orcaslicer master branch',
                head: 'snapmaker-orca',
                base: 'master'
              });
            }
