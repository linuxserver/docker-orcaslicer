---
services:
  orcaslicer:
    image: ghcr.io/totalitarian/docker-snapmakerorcaslicer:latest
    container_name: orcaslicer-snapmaker
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PIXELFLUX_WAYLAND=true
    volumes:
      - ./config:/config
    ports:
      - 3000:3000
      - 3001:3001
    shm_size: "1gb"
    restart: unless-stopped
